<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d9488" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- SEO Title & Description -->
    <title>Little Flower Institute of Paramedical Sciences Kerala</title>
    <meta
      name="description"
      content="Little Flower Institute of Paramedical Sciences - Best paramedical institute in Kerala offering lab training, hostel facilities, and expert faculty."
    />
    <meta name="author" content="Little Flower Institute" />
    <meta
      name="keywords"
      content="paramedical institute Kerala, lab technician course, nursing assistant course, medical lab training Kerala"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://paramedical-institute-website.vercel.app/" />

    <!-- Open Graph / Facebook Preview -->
    <meta property="og:title" content="Little Flower Institute Paramedical" />
    <meta
      property="og:description"
      content="Leading paramedical institute providing quality education and healthcare training."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://paramedical-institute-website.vercel.app/" />
    <meta property="og:image" content="/placeholder.svg" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Little Flower Institute Paramedical" />
    <meta
      name="twitter:description"
      content="Best paramedical institute in Kerala with modern lab and training."
    />
    <meta name="twitter:image" content="/placeholder.svg" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Little Flower Institute of Paramedical Sciences",
      "url": "https://paramedical-institute-website.vercel.app/",
      "logo": "https://paramedical-institute-website.vercel.app/favicon.ico",
      "sameAs": [
        "https://www.facebook.com/yourpage",
        "https://www.linkedin.com/company/yourcompany",
        "https://twitter.com/yourtwitter"
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Your Street Address",
        "addressLocality": "Kerala",
        "postalCode": "XXXXXX",
        "addressCountry": "IN"
      }
    }
    </script>
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- Example React Component -->
    <!-- You can add homepage content inside React components -->

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
